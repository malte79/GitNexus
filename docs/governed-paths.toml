version = 1

[governed]
include = [
  "docs/**/*.md",
  "planning/master-intent.md",
  "planning/archive/epics-todo.md",
  "planning/epics/**/*.md",
]
exclude = []

[contracts]
require_docs_when_changed = [
  "AGENTS.md",
  ".codex/skills/codereview/SKILL.md",
  ".codex/skills/cr/SKILL.md",
  ".codex/skills/mech/SKILL.md",
  ".codex/skills/prep/SKILL.md",
  ".codex/skills/merge/SKILL.md",
  "package.json",
  "scripts/check-docs-contracts.mjs",
  "scripts/docs-manifest.mjs",
  "scripts/lint-docs.mjs",
  "src/cli/**/*.ts",
  "src/mcp/**/*.ts",
  "src/server/**/*.ts",
  "src/storage/**/*.ts",
]

allow_no_docs_when_only_changed = [
  "test/**/*",
  "planning/master-intent.md",
  "planning/archive/epics-todo.md",
  "planning/epics/**/*.md",
]
